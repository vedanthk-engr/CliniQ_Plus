<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>ClinIQ+ Loading</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
          },
          colors: {
            dark: {
              900: '#0a0a0c',
              800: '#111215',
              700: '#1a1b20',
            },
            brand: {
              yellow: '#FFD700',
              pink: '#FF69B4',
              blue: '#00BFFF',
            }
          },
          boxShadow: {
            'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
            'glow': '0 0 20px rgba(0, 191, 255, 0.4)',
          },
          animation: {
            'blob': 'blob 10s infinite',
          },
          keyframes: {
            blob: {
              '0%': { transform: 'translate(0px, 0px) scale(1)' },
              '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
              '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
              '100%': { transform: 'translate(0px, 0px) scale(1)' },
            }
          }
        }
      }
    }
  </script>
<style data-purpose="custom-animations">
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.8; transform: scale(1); filter: hue-rotate(0deg); }
      50% { opacity: 1; transform: scale(1.05); filter: hue-rotate(15deg); }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    @keyframes particle-drift {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
    }
    
    .bg-spatial {
      background: #0a0a0c;
    }
    .glass-card {
      background: rgba(17, 18, 21, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.2);
      border-left-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
    }
    .text-glow {
      text-shadow: 0 0 20px rgba(255, 105, 180, 0.6), 0 0 10px rgba(0, 191, 255, 0.4);
    }
    .progress-bar-glow {
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.8), 0 0 30px rgba(255, 105, 180, 0.4);
    }
    .bokeh {
      position: absolute;
      border-radius: 50%;
      filter: blur(4px);
      animation: particle-drift 8s infinite ease-in-out alternate;
    }
    .gradient-text {
      background: linear-gradient(to right, #FFD700, #FF69B4, #00BFFF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>
<body class="bg-spatial min-h-screen flex items-center justify-center font-sans text-white overflow-hidden relative min-h-screen">
<!-- BEGIN: Background Blobs & Particles -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden">
<!-- Blobs -->
<div class="absolute top-0 left-1/4 w-96 h-96 bg-brand-blue/30 rounded-full mix-blend-screen filter blur-[100px] animate-blob"></div>
<div class="absolute top-1/4 right-1/4 w-96 h-96 bg-brand-pink/30 rounded-full mix-blend-screen filter blur-[100px] animate-blob" style="animation-delay: 2s;"></div>
<div class="absolute -bottom-8 left-1/3 w-96 h-96 bg-brand-yellow/20 rounded-full mix-blend-screen filter blur-[100px] animate-blob" style="animation-delay: 4s;"></div>
<!-- Bokeh Particles -->
<div class="bokeh w-6 h-6 top-1/4 left-1/5 bg-brand-yellow/60" style="--tx: 50px; --ty: -50px; animation-delay: 0s;"></div>
<div class="bokeh w-8 h-8 bottom-1/3 right-1/4 bg-brand-pink/60" style="--tx: -40px; --ty: -90px; animation-delay: 2s;"></div>
<div class="bokeh w-4 h-4 top-1/3 right-1/3 bg-brand-blue/80" style="--tx: 70px; --ty: 30px; animation-delay: 4s;"></div>
<div class="bokeh w-5 h-5 bottom-1/4 left-1/3 bg-brand-blue/50" style="--tx: -50px; --ty: 70px; animation-delay: 1s;"></div>
<div class="bokeh w-7 h-7 top-1/2 left-2/3 bg-brand-yellow/50" style="--tx: 30px; --ty: -60px; animation-delay: 3s;"></div>
</div>
<!-- END: Background Blobs & Particles -->
<!-- BEGIN: Loading Container -->
<main class="relative z-10 w-full max-w-md mx-auto px-6">
<div class="glass-card rounded-2xl p-8 flex flex-col items-center animate-[float_6s_ease-in-out_infinite] relative overflow-hidden">
<!-- Inner Glass Layer for depth -->
<div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent pointer-events-none"></div>
<!-- Logo Area -->
<div class="mb-10 text-center animate-[pulse-glow_4s_ease-in-out_infinite] relative z-10">
<h1 class="text-5xl font-extrabold tracking-tight gradient-text text-glow">ClinIQ+</h1>
</div>
<!-- Loading Info -->
<div class="w-full mb-8 relative z-10">
<div class="flex justify-between items-end mb-3">
<div class="flex flex-col">
<span class="text-xs text-brand-blue/80 font-bold uppercase tracking-widest mb-1">Status</span>
<span class="text-lg text-gray-100 font-semibold tracking-wide">Initializing clinical data...</span>
</div>
<span class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-t from-gray-300 to-white">87%</span>
</div>
<!-- Progress Bar -->
<div class="h-3 w-full bg-dark-900/80 rounded-full overflow-hidden border border-white/10 relative shadow-inner">
<div class="absolute inset-y-0 left-0 bg-gradient-to-r from-brand-blue via-brand-pink to-brand-yellow w-[87%] rounded-full progress-bar-glow">
<!-- Shimmer effect inside progress bar -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/40 to-transparent -translate-x-full animate-[shimmer_1.5s_infinite]"></div>
</div>
</div>
<p class="text-sm text-gray-400 mt-3 text-right font-medium">Connecting to core systems</p>
</div>
<!-- Functional Badge -->
<div class="mt-4 inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-dark-900/60 border border-brand-blue/30 shadow-[0_0_15px_rgba(0,191,255,0.15)] backdrop-blur-md relative z-10">
<svg class="h-4 w-4 text-brand-blue drop-shadow-[0_0_5px_rgba(0,191,255,0.8)]" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path>
</svg>
<span class="text-xs font-semibold tracking-wide text-gray-200">Secure Enterprise Environment</span>
</div>
</div>
</main>
<!-- END: Loading Container -->
<style data-purpose="shimmer-animation">
    @keyframes shimmer {
      100% { transform: translateX(100%); }
    }
  </style>


</body></html>
