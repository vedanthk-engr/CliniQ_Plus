<!DOCTYPE html>

<html class="light" lang="en"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "error": "#ba1a1a",

                        "surface-tint": "#5f5e5e",
                        "primary-fixed-dim": "#c8c6c5",
                        "on-error-container": "#93000a",
                        "surface-container-highest": "#e3e2df",
                        "surface-container-high": "#e9e8e4",
                        "secondary": "#755b00",

                        "primary": "#000000",
                        "outline-variant": "#c4c7c7",
                        "secondary-container": "#fdcf49",
                        "on-primary-fixed": "#1c1b1b",
                        "on-error": "#ffffff",
                        "on-primary-container": "#858383",
                        "inverse-primary": "#c8c6c5",
                        "secondary-fixed-dim": "#eec13c",

                        "on-background": "#1b1c1a",

                    spacing: {
                        "card-padding": "24px",
                        "stack-gap": "12px",
                        "gutter": "24px",
                        "sidebar-width": "200px",
                        "margin-page": "32px"
                    },
                    fontFamily: {
                        "headline-lg": ["DM Sans", "sans-serif"],
                        "body-md": ["DM Sans", "sans-serif"],
                        "label-bold": ["DM Sans", "sans-serif"],
                        "label-sm": ["DM Sans", "sans-serif"],
                        "body-sm": ["DM Sans", "sans-serif"],
                        "display-metric": ["DM Sans", "sans-serif"],
                        "headline-card": ["DM Sans", "sans-serif"]

                    fontSize: {

                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',

                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .bg-vibrant-gradient {
            background: linear-gradient(135deg, rgba(255, 217, 228, 0.4) 0%, rgba(253, 207, 73, 0.2) 100%);
        }
        .mic-glow {
            box-shadow: 0 0 40px rgba(255, 176, 204, 0.6), 0 0 80px rgba(255, 176, 204, 0.3);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md h-screen w-screen overflow-hidden flex flex-col relative bg-vibrant-gradient">
<!-- Decorative Corner Blobs -->
<div class="absolute -top-32 -right-32 w-96 h-96 bg-tertiary-fixed-dim/30 rounded-full blur-3xl opacity-60"></div>
<div class="absolute -bottom-32 -left-32 w-[500px] h-[500px] bg-secondary-container/20 rounded-full blur-3xl opacity-60"></div>
<!-- Top Navigation / Action Bar -->
<header class="w-full flex justify-between items-center px-margin-page py-6 z-10">
<div class="font-headline-lg text-headline-lg font-bold text-primary">
            ClinIQ+ <span class="text-on-surface-variant font-normal text-lg ml-2">Patient Mode</span>
</div>
<button class="glass-panel px-6 py-3 rounded-full font-label-bold flex items-center gap-2 hover:bg-white/90 transition-colors shadow-sm">
<span class="material-symbols-outlined text-sm">close</span>
            Exit Patient Mode
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center relative z-10 px-margin-page pb-20">
<!-- Greeting -->
<div class="text-center mb-12 animate-float">
<h1 class="font-display-metric text-display-metric text-primary mb-4">Hello Arjun,</h1>
<p class="font-headline-lg text-headline-lg text-on-surface-variant">How can I help you today?</p>
</div>
<!-- Language Selection Chips -->
<div class="flex gap-4 mb-16 flex-wrap justify-center">
<button class="px-6 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-bold hover:bg-surface-container-high transition-colors">English</button>
<button class="px-6 py-2 rounded-full bg-tertiary-fixed-dim text-on-tertiary-container font-label-bold shadow-sm shadow-tertiary-fixed-dim/50 border border-transparent">Hindi</button>
<button class="px-6 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-bold hover:bg-surface-container-high transition-colors">Tamil</button>
<button class="px-6 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-bold hover:bg-surface-container-high transition-colors">Telugu</button>
</div>
<!-- Central Voice Interaction Hero -->
<div class="relative flex items-center justify-center mb-16">
<!-- Outer Ripple Rings -->
<div class="absolute inset-0 rounded-full border-2 border-tertiary-fixed-dim opacity-20 animate-ping" style="animation-duration: 3s;"></div>
<div class="absolute inset-0 rounded-full border-2 border-tertiary-fixed-dim opacity-40 animate-ping" style="animation-duration: 3s; animation-delay: 1s;"></div>
<!-- Main Mic Button -->
<button class="w-48 h-48 rounded-full bg-gradient-to-br from-tertiary-fixed-dim to-on-tertiary-container flex items-center justify-center mic-glow transform hover:scale-105 transition-transform duration-300 relative z-10">
<span class="material-symbols-outlined text-white" style="font-size: 64px; font-variation-settings: 'FILL' 1;">mic</span>
<!-- Inner soft shadow -->
<div class="absolute inset-0 rounded-full shadow-[inset_0_4px_12px_rgba(255,255,255,0.4)]"></div>
</button>
<!-- Reference Image (Hidden but included as requested) -->
<img alt="Previous UI reference" class="hidden" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBvz9GQRCa1GGO3CaG5lt2hVcfsE8dgmeXS_aQvRy2utmy6UNacNeFZFCZbeYkuVV5mmFVDJkOwoOws_HrDpi6Lhg1nB2UlCCcyatkMHr3sgpu9g-gEj6Cdjxf2EfioU6_KbycmpJ73S2TFGM6SZcoWlK4a4BVmQe0fr_lQcJh8CT4TnFaJmyLjcgtb_k28Ahhhltmg2SYi63kyFlob61CdyZmC0ZcNBKa-iy58sfq3RRdol7xlC2ygD7RQKDkvMWkScVEbZnT9e_e"/>
</div>
<!-- Interactive Prompt Card -->
<div class="glass-panel rounded-card p-6 max-w-2xl text-center shadow-lg border border-white/60">
<div class="flex items-center justify-center gap-3 mb-2">
<span class="material-symbols-outlined text-on-tertiary-container">info</span>
<span class="font-label-bold text-on-tertiary-container uppercase tracking-wider">Try saying</span>
</div>
<p class="font-headline-card text-headline-card text-primary">
                "Speak symptoms, missed medication details, or hold up a pill to ask what it does."
            </p>
</div>
</main>
<!-- Bottom Navigation Shell (Semantic Map: Suppressed based on 'Patient Mode' fullscreen intent, but required by JSON. Will render a context-appropriate bottom bar for Patient Mode if needed, but per rules, transactional/focused screens suppress standard global nav. We will suppress it here as it is a focused interaction screen.) -->
<!-- Ambient Floating Elements -->
<div class="absolute top-1/4 left-1/4 w-12 h-12 rounded-full bg-secondary-container/40 blur-md animate-float" style="animation-delay: 0.5s;"></div>
<div class="absolute bottom-1/3 right-1/4 w-16 h-16 rounded-full bg-tertiary-fixed-dim/40 blur-md animate-float" style="animation-delay: 1.2s;"></div>
</body></html>
