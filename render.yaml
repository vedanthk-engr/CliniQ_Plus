services:
  - type: web
    name: cliniq-backend
    runtime: python
    rootDir: cliniq-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You set this manually in the Render dashboard
    autoDeploy: true
